<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 可视化编辑器</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function HTMLEditor() {
            const [htmlContent, setHtmlContent] = useState('');
            const [editableContent, setEditableContent] = useState('');
            const [fileName, setFileName] = useState('');
            const [isEditing, setIsEditing] = useState(false);
            const [showImageEditor, setShowImageEditor] = useState(false);
            const [currentImage, setCurrentImage] = useState(null);
            const [imageUrl, setImageUrl] = useState('');
            const fileInputRef = useRef(null);
            const contentRef = useRef(null);
            const imageInputRef = useRef(null);

            // 监听图片点击事件
            useEffect(() => {
                const handleClick = (e) => {
                    if (e.target.tagName === 'IMG') {
                        e.preventDefault();
                        e.stopPropagation();
                        setCurrentImage(e.target);
                        setImageUrl(e.target.src || '');
                        setShowImageEditor(true);
                    }
                };

                if (contentRef.current && isEditing) {
                    contentRef.current.addEventListener('click', handleClick, true);
                }

                return () => {
                    if (contentRef.current) {
                        contentRef.current.removeEventListener('click', handleClick, true);
                    }
                };
            }, [isEditing, editableContent]);

            // 加载 HTML 文件
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileName(file.name);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    setHtmlContent(content);
                    setEditableContent(content);
                    setIsEditing(true);
                };
                reader.readAsText(file);
            };

            // 上传新图片
            const handleUploadNewImage = () => {
                imageInputRef.current?.click();
            };

            // 处理图片上传
            const handleImageFileChange = (e) => {
                const file = e.target.files[0];
                if (!file || !currentImage) return;

                const reader = new FileReader();
                reader.onload = (loadEvent) => {
                    const base64 = loadEvent.target.result;
                    currentImage.src = base64;
                    setImageUrl(base64);
                    
                    if (contentRef.current) {
                        setEditableContent(contentRef.current.innerHTML);
                    }
                };
                reader.readAsDataURL(file);
                
                if (imageInputRef.current) {
                    imageInputRef.current.value = '';
                }
            };

            // 修改图片URL
            const handleUpdateImageUrl = () => {
                if (currentImage && imageUrl) {
                    currentImage.src = imageUrl;
                    
                    if (contentRef.current) {
                        setEditableContent(contentRef.current.innerHTML);
                    }
                    
                    setShowImageEditor(false);
                }
            };

            // 关闭图片编辑器
            const handleCloseImageEditor = () => {
                setShowImageEditor(false);
                setCurrentImage(null);
                setImageUrl('');
            };

            // 保存编辑内容
            const handleContentChange = () => {
                if (contentRef.current) {
                    setEditableContent(contentRef.current.innerHTML);
                }
            };

            // 导出 HTML
            const handleExport = () => {
                const blob = new Blob([editableContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'edited.html';
                a.click();
                URL.revokeObjectURL(url);
            };

            // 重新加载
            const handleReset = () => {
                setIsEditing(false);
                setHtmlContent('');
                setEditableContent('');
                setFileName('');
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 p-6">
                    <div className="max-w-6xl mx-auto">
                        {/* 头部 */}
                        <div className="bg-white rounded-2xl shadow-lg p-6 mb-6">
                            <h1 className="text-3xl font-bold text-slate-800 mb-2">
                                HTML 可视化编辑器
                            </h1>
                            <p className="text-slate-600">
                                上传 HTML 文件，直接编辑内容和替换图片
                            </p>
                        </div>

                        {/* 上传区域 */}
                        {!isEditing && (
                            <div className="bg-white rounded-2xl shadow-lg p-12">
                                <div className="border-3 border-dashed border-slate-300 rounded-xl p-12 text-center hover:border-blue-400 transition-colors">
                                    <div className="mb-4">
                                        <svg className="w-16 h-16 mx-auto text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                        </svg>
                                    </div>
                                    <h3 className="text-xl font-semibold text-slate-700 mb-2">
                                        上传 HTML 文件
                                    </h3>
                                    <p className="text-slate-500 mb-6">
                                        点击或拖拽文件到此处
                                    </p>
                                    <input
                                        ref={fileInputRef}
                                        type="file"
                                        accept=".html,.htm"
                                        onChange={handleFileUpload}
                                        className="hidden"
                                        id="file-upload"
                                    />
                                    <label
                                        htmlFor="file-upload"
                                        className="inline-block px-6 py-3 bg-blue-500 text-white rounded-lg cursor-pointer hover:bg-blue-600 transition-colors font-medium"
                                    >
                                        选择文件
                                    </label>
                                </div>
                            </div>
                        )}

                        {/* 图片编辑面板 */}
                        {showImageEditor && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full p-6">
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-2xl font-bold text-slate-800">编辑图片</h2>
                                        <button
                                            onClick={handleCloseImageEditor}
                                            className="text-slate-400 hover:text-slate-600 transition-colors"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    </div>

                                    {/* 图片预览 */}
                                    <div className="mb-6">
                                        <p className="text-sm font-medium text-slate-700 mb-2">当前图片预览：</p>
                                        <div className="border-2 border-slate-200 rounded-lg p-4 bg-slate-50 flex items-center justify-center min-h-[200px]">
                                            {currentImage && (
                                                <img
                                                    src={imageUrl}
                                                    alt="预览"
                                                    className="max-h-[300px] max-w-full object-contain rounded"
                                                />
                                            )}
                                        </div>
                                    </div>

                                    {/* 修改URL */}
                                    <div className="mb-6">
                                        <label className="block text-sm font-medium text-slate-700 mb-2">
                                            图片 URL 地址：
                                        </label>
                                        <input
                                            type="text"
                                            value={imageUrl}
                                            onChange={(e) => setImageUrl(e.target.value)}
                                            placeholder="https://example.com/image.jpg"
                                            className="w-full px-4 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors"
                                        />
                                    </div>

                                    {/* 操作按钮 */}
                                    <div className="flex gap-3">
                                        <button
                                            onClick={handleUploadNewImage}
                                            className="flex-1 px-4 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors font-medium flex items-center justify-center gap-2"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                            </svg>
                                            上传新图片
                                        </button>
                                        <button
                                            onClick={handleUpdateImageUrl}
                                            className="flex-1 px-4 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-medium flex items-center justify-center gap-2"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                                            </svg>
                                            确认修改
                                        </button>
                                    </div>

                                    <input
                                        ref={imageInputRef}
                                        type="file"
                                        accept="image/*"
                                        onChange={handleImageFileChange}
                                        className="hidden"
                                    />
                                </div>
                            </div>
                        )}

                        {/* 编辑区域 */}
                        {isEditing && (
                            <div className="space-y-4">
                                {/* 工具栏 */}
                                <div className="bg-white rounded-2xl shadow-lg p-4 flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="flex items-center gap-2">
                                            <svg className="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                            </svg>
                                            <span className="font-medium text-slate-700">{fileName}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={handleReset}
                                            className="px-4 py-2 text-slate-600 hover:text-slate-800 hover:bg-slate-100 rounded-lg transition-colors font-medium"
                                        >
                                            重新加载
                                        </button>
                                        <button
                                            onClick={handleExport}
                                            className="px-6 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition-colors font-medium flex items-center gap-2"
                                        >
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                            </svg>
                                            导出 HTML
                                        </button>
                                    </div>
                                </div>

                                {/* 使用说明 */}
                                <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                    <div className="flex gap-3">
                                        <svg className="w-5 h-5 text-blue-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                        <div className="text-sm text-blue-800">
                                            <p className="font-semibold mb-1">编辑提示：</p>
                                            <ul className="space-y-1">
                                                <li>• 直接点击文字即可编辑内容</li>
                                                <li>• <strong>点击图片</strong>打开编辑面板，可以上传新图片或修改图片URL</li>
                                                <li>• 支持外链图片地址修改</li>
                                                <li>• 编辑完成后点击"导出 HTML"保存</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>

                                {/* 内容编辑区 */}
                                <div className="bg-white rounded-2xl shadow-lg p-8">
                                    <div
                                        ref={contentRef}
                                        contentEditable
                                        suppressContentEditableWarning
                                        onInput={handleContentChange}
                                        dangerouslySetInnerHTML={{ __html: editableContent }}
                                        className="prose max-w-none focus:outline-none min-h-[400px]"
                                        style={{ cursor: 'text' }}
                                    />
                                </div>

                                {/* 底部提示 */}
                                <div className="text-center text-sm text-slate-500">
                                    上传的图片会以 Base64 格式嵌入，外链图片保持 URL 形式
                                </div>
                            </div>
                        )}
                    </div>

                    <style>{`
                        .prose img {
                            cursor: pointer !important;
                            transition: all 0.2s;
                            border-radius: 8px;
                            border: 2px solid transparent;
                        }
                        .prose img:hover {
                            border-color: #3b82f6;
                            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
                            transform: scale(1.02);
                        }
                        [contenteditable]:focus {
                            outline: 2px solid #3b82f6;
                            outline-offset: 4px;
                            border-radius: 8px;
                        }
                        [contenteditable] * {
                            cursor: text;
                        }
                        [contenteditable] img {
                            cursor: pointer !important;
                        }
                    `}</style>
                </div>
            );
        }

        ReactDOM.render(<HTMLEditor />, document.getElementById('root'));
    </script>
</body>
</html>
